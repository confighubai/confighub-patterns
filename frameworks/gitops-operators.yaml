schema_version: framework-definition-v1
id: FRM-GITOPS-0001
slug: gitops-operators
name: GitOps operators
family: gitops-operators
summary: Curated controls for diagnosing intent, reconciliation, and live-state problems in GitOps-managed workloads.
description: >
  This framework groups the first operator-facing controls for Argo CD and Flux.
  It is aimed at teams who need to distinguish desired-state defects from
  rollout and reconciliation failures.
maturity: seeded
control_ids:
  - CTRL-GITOPS-0001
  - CTRL-GITOPS-0002
  - CTRL-GITOPS-0003
  - CTRL-GITOPS-0004
  - CTRL-GITOPS-0005
platforms:
  - argocd
  - flux
  - kubernetes
tags:
  - gitops
  - operators
  - reconciliation
  - intent-vs-live
outcomes:
  - Surface the highest-signal GitOps health failures in one operator-facing bundle.
  - Encourage intent-vs-live comparison instead of treating every failure as the same class of problem.
  - Make healthy Argo CD and Flux configuration defaults visible as promoted controls, not just scattered pattern IDs.
  - Keep multi-application generator and reconcile-path safety in the same framework as live health failures.
  - Provide a stable framework surface before the full pattern corpus is promoted into controls.
