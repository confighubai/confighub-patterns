outcomes:
  - Surface the first stable cluster-hardening controls in one operator-facing bundle.
  - Keep pod security boundaries, control-plane certificates, and admission reliability visible together.
  - Provide a clean starting point for future API server, scheduler, and kubelet hardening controls.
