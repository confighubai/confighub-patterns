  - helm
tags:
  - platform
  - baseline
  - operator
  - gitops
  - intent-vs-live
outcomes:
  - Give platform teams one baseline view that crosses family boundaries instead of forcing them to assemble controls manually.
  - Keep GitOps health, workload safety, identity posture, network exposure, secret hygiene, Kyverno, Gatekeeper, and admission safeguards in one operator-facing bundle.
  - Provide a practical "good configuration" starter surface for future explanations, scorecards, and AI-assisted triage.
