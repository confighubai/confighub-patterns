schema_version: framework-definition-v1
id: FRM-PLATFORM-0001
slug: platform-best
name: Platform best
family: platform-best
summary: Opinionated cross-family baseline for running GitOps-managed Kubernetes platforms with safer defaults.
description: >
  This framework curates the highest-value promoted controls across GitOps,
  workload hardening, identity, exposure, secrets, and cluster safety. It is
  meant to answer "what good looks like" for platform teams who want a focused
  operational baseline instead of a broad compliance checklist.
