summary: Curated controls for ingress, TLS, NetworkPolicy, Gateway API, Istio, Linkerd, and Traefik posture.
description: >
  This framework groups the first promoted controls for network-facing
  Kubernetes configuration. It is intended to help teams reason about safe
  exposure, controller selection, TLS posture, Gateway API semantics, and
  policy-driven connectivity in one place.
