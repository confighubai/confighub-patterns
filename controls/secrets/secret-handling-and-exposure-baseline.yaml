schema_version: control-definition-v1
id: CTRL-SECRETS-0002
slug: secret-handling-and-exposure-baseline
name: Secret handling and exposure baseline
family: secrets-and-credentials
summary: Detect credential handling patterns that expose secrets through ConfigMaps, permissive file access, or plaintext logs.
description: >
  This control focuses on the operator-facing secret hygiene failures that make
  credentials easy to leak: secrets stored in ConfigMaps, overly permissive
  credential files, plaintext logging, and cleartext password material embedded
  in generated configs.
maturity: seeded
severity: critical
supported_surfaces:
  - static
  - live_state
supported_consumers:
  - cli
  - cub_scout
  - confighub
  - sdk
  - ai
detection_modes:
  - native_rule
resource_kinds:
  - Secret
  - ConfigMap
  - Deployment
  - Service
pattern_ids:
  - CCVE-2025-0229
  - CCVE-2025-0593
  - CCVE-2025-2543
  - CCVE-2025-2544
  - CCVE-2025-3279
  - CCVE-2025-3508
tags:
  - secrets
  - credentials
  - configmap
  - plaintext
  - file-permissions
  - baseline
remediation:
  strategy: config_fix
  safety_class: review_required
  guidance:
    - Keep credential material in Secrets or external stores, not ConfigMaps or generated plaintext configs.
    - Lock down credential file permissions and remove plaintext credential logging paths.
    - Treat cleartext passwords and credential leaks as security issues even when the workload still functions.
evidence_expectations:
  intent_signals:
    - Secret vs ConfigMap placement
    - credential file mode configuration
    - logging or rendered config values carrying credential material
  live_signals:
    - mounted credential files readable too broadly
    - cleartext credentials visible in generated config or logs
  corroborating_sources:
    - kubectl get secret,configmap -o yaml
    - rendered config inspection
    - workload logs
