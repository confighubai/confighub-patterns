schema_version: control-definition-v1
id: CTRL-SECRETS-0001
slug: external-secret-store-baseline
name: External secret store baseline
family: secrets-and-credentials
summary: Detect ExternalSecret and SecretStore posture that quietly breaks sync, trust, or secret regeneration.
description: >
  This control groups the high-signal external secret management failures that
  operators actually need surfaced together: auth validation problems, deleted
  SecretStore references, broken refresh semantics, TLS verification failures,
  and secrets that never get recreated after external deletion.
maturity: seeded
severity: critical
supported_surfaces:
  - static
  - live_state
supported_consumers:
  - cli
  - cub_scout
  - confighub
  - sdk
  - ai
detection_modes:
  - native_rule
resource_kinds:
  - ExternalSecret
  - SecretStore
  - ClusterSecretStore
pattern_ids:
  - CCVE-2025-0067
  - CCVE-2025-0068
  - CCVE-2025-0124
  - CCVE-2025-0125
  - CCVE-2025-0296
  - CCVE-2025-0297
  - CCVE-2025-0480
  - CCVE-2025-0481
  - CCVE-2025-2654
  - CCVE-2025-2676
tags:
  - secrets
  - externalsecret
  - secretstore
  - sync
  - credentials
  - baseline
remediation:
  strategy: diagnose_then_fix
  safety_class: review_required
  guidance:
    - Validate SecretStore authentication and TLS trust before debugging downstream missing secrets.
    - Use non-zero refresh intervals and verify external deletion or rotation paths are exercised safely.
    - Treat silent sync failures as platform incidents, not low-priority drift.
evidence_expectations:
  intent_signals:
    - spec.secretStoreRef
    - spec.refreshInterval
    - provider TLS and auth configuration
  live_signals:
    - status.conditions
    - target Secret missing or stale after external change
  corroborating_sources:
    - kubectl get externalsecret,secretstore,clustersecretstore -o yaml
    - external-secrets controller logs
    - provider auth and TLS diagnostics
