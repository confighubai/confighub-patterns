schema_version: control-definition-v1
id: CTRL-GITOPS-0002
slug: flux-reconciliation-reliability
name: Flux reconciliation reliability
family: gitops-operators
summary: Detect source, build, release, and dependency conditions that cause Flux reconciliation to stall or fail.
description: >
  This control covers the high-signal Flux failure modes that show up as broken
  GitRepository sources, failed Kustomization builds, and stalled HelmRelease
  reconciliation. It includes critical source readiness failures that block the
  entire GitOps pipeline, especially where static config and live-state evidence
  need to be read together.
maturity: seeded
severity: high
supported_surfaces:
  - static
  - live_state
  - repo_vs_live
supported_consumers:
  - cli
  - cub_scout
  - confighub
  - ai
detection_modes:
  - native_rule
  - derived_comparison
resource_kinds:
  - GitRepository
  - HelmRelease
  - Kustomization
pattern_ids:
  - CCVE-2025-0001
  - CCVE-2025-0002
  - CCVE-2025-0003
  - CCVE-2025-0007
  - CCVE-2025-0013
  - CCVE-2025-0166
  - CCVE-2025-5001
  - CCVE-2025-5002
tags:
  - flux
  - gitops
  - gitrepository
  - helmrelease
  - kustomization
  - reconciliation
  - source-readiness
example_refs:
  - repo: confighub-scan
    path: examples/gitops-good-baselines/flux-gitrepository-kustomization-good.yaml
    purpose: Healthy source and kustomization baseline used to contrast stalled or cyclic reconciliation cases.
  - repo: confighub-scan
    path: examples/gitops-good-baselines/flux-helmrelease-good.yaml
    purpose: Healthy HelmRelease baseline used to explain timeout and Ready-state failures without secret or chart drift noise.
remediation:
  strategy: diagnose_then_fix
  safety_class: review_required
  guidance:
    - Check GitRepository authentication and network access when source is not ready.
    - Verify Kustomization overlay paths and patch targets when builds fail.
    - Confirm HelmRepository and chart references when HelmRelease cannot fetch chart.
    - Fix dependency cycles and timeout configuration in intent before retrying reconciliation.
    - Correlate live Ready or progressing state with the desired config to separate rollout lag from bad configuration.
    - Use live cluster evidence when investigating stuck or repeatedly failing releases.
evidence_expectations:
  intent_signals:
    - spec.timeout
    - spec.dependsOn
    - spec.url (GitRepository)
    - spec.chart (HelmRelease)
  live_signals:
    - status.conditions
    - Ready False or Unknown reconciliation state
    - source-controller error messages
  corroborating_sources:
    - flux get sources git -A
    - flux get all
    - source-controller logs
    - kustomize-controller logs
    - helm-controller logs
