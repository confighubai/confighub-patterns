schema_version: control-definition-v1
id: CTRL-RBAC-0002
slug: service-account-identity-baseline
name: Service account identity baseline
family: rbac-and-identity
summary: Detect RoleBinding and workload identity defaults that quietly widen effective service account access.
description: >
  This control focuses on the identity-side RBAC mistakes that are easy to miss
  in reviews: broken RoleBinding scope assumptions and unnecessary
  automounted service account credentials on workloads that do not need them.
  It is meant to make service-account identity exposure visible before it turns
  into lateral movement or confusing auth failures.
maturity: seeded
severity: high
supported_surfaces:
  - static
  - live_state
supported_consumers:
  - cli
  - cub_scout
  - confighub
  - sdk
  - ai
detection_modes:
  - native_rule
resource_kinds:
  - RoleBinding
  - Deployment
  - StatefulSet
  - DaemonSet
pattern_ids:
  - CCVE-2025-1137
  - CCVE-2025-2432
  - CCVE-2025-3153
  - CCVE-2025-3746
  - CCVE-2025-3752
  - CCVE-2025-3758
tags:
  - rbac
  - service-account
  - automount
  - identity
  - baseline
remediation:
  strategy: config_fix
  safety_class: review_required
  guidance:
    - Make RoleBinding scope explicit and avoid bindings whose real privilege boundary is ambiguous or missing.
    - Disable automountServiceAccountToken by default on workloads that do not need Kubernetes API credentials.
    - Review service account intent together with bound roles so identity exposure and permission scope are evaluated together.
evidence_expectations:
  intent_signals:
    - roleRef
    - subjects[]
    - spec.template.spec.automountServiceAccountToken
  live_signals:
    - effective RoleBinding scope in cluster
    - running workloads with unnecessary service account tokens mounted
  corroborating_sources:
    - kubectl get rolebinding -o yaml
    - kubectl get deployment,statefulset,daemonset -o yaml
    - mounted token or projected volume inspection
